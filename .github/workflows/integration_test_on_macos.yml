name: Integration Tests on macOS

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'ios/**'
      - 'macos/**'
  # push:
  #   branches: [ main, master ]

jobs:
  macos_integration_test:
    runs-on: macos-latest
    strategy:
      # Run both lanes to completion: a CocoaPods regression and an SPM
      # regression are independent signals.
      fail-fast: false
      matrix:
        # cocoapods = SPM disabled (legacy/default path for older Flutter)
        # spm       = Swift Package Manager enabled (flutter config opt-in)
        include:
          - package-manager: cocoapods
            spm-flag: no-enable
          - package-manager: spm
            spm-flag: enable

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: 'stable'
          cache: true

      - name: Enable macOS desktop support
        run: flutter config --enable-macos-desktop

      - name: Configure Swift Package Manager flag
        run: flutter config --${{ matrix.spm-flag }}-swift-package-manager

      - name: Install dependencies
        run: |
          flutter pub get
          cd example
          flutter pub get

      - name: Verify model file exists
        run: |
          find . -name "addition_model.ort" || echo "Model not found!"
          ls -la example/assets/models || echo "Directory not found!"

      - name: Run integration tests on macOS
        run: |
          # Use the existing example app
          cd example

          # Run the integration test directly (tee for the SPM-warning check below)
          flutter test integration_test/all_tests.dart -d macos 2>&1 | tee build.log

      - name: Verify SPM adoption warning is gone (SPM lane only)
        if: matrix.package-manager == 'spm'
        # The build the test triggered must not warn that this plugin lacks SPM support.
        run: '! grep -q "do not support Swift Package Manager" example/build.log'

  # Build-only iOS lane: catches link/header/deployment-target errors in both
  # install paths without the cost of running simulator integration tests.
  ios_build_test:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package-manager: cocoapods
            spm-flag: no-enable
          - package-manager: spm
            spm-flag: enable

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: 'stable'
          cache: true

      - name: Configure Swift Package Manager flag
        run: flutter config --${{ matrix.spm-flag }}-swift-package-manager

      - name: Install dependencies
        run: |
          flutter pub get
          cd example
          flutter pub get

      - name: Build iOS app (simulator, no codesign)
        run: |
          cd example
          flutter build ios --simulator --debug 2>&1 | tee build.log

      - name: Verify SPM adoption warning is gone (SPM lane only)
        if: matrix.package-manager == 'spm'
        run: '! grep -q "do not support Swift Package Manager" example/build.log'

  android_integration_test:
    runs-on: macos-13 # macOS runner needed for Android emulator

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'adopt'
          java-version: '17'

      - name: Install dependencies
        run: |
          flutter pub get
          cd example
          flutter pub get

      - name: Verify model file exists
        run: |
          find . -name "addition_model.ort" || echo "Model not found!"
          ls -la example/assets/models || echo "Directory not found!"

      - name: Start Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 26
          arch: x86_64
          target: google_apis
          profile: Nexus 6
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: |
            set -e # Exit immediately if a command exits with a non-zero status

            pwd # Verify current directory

            echo "--- Running flutter drive ---"
            # TODO: need to verify if this works
            cd example && flutter drive --driver=test_driver/integration_test.dart --target=integration_test/all_tests.dart
            echo "--- Flutter drive finished ---"
